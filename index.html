<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEFI BIOS 啟動日誌分析器</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2129;
            --border: #30363d;
            --text: #e6edf3;
            --text2: #b0b8c4;
            --text3: #8b949e;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --warn: #d29922;
            --danger: #f85149;
            --sec-color: #f0883e;
            --pei-color: #58a6ff;
            --dxe-color: #3fb950;
            --bds-color: #bc8cff;
            --tsl-color: #f778ba;
            --rt-color: #ff7b72;
            --al-color: #8b949e;
            --pow-color: #e6ed3f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .app-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-header h1 .icon {
            font-size: 1.6rem;
        }
        .app-header .subtitle {
            font-size: 0.8rem;
            color: var(--text3);
            margin-top: 2px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: var(--surface);
            margin-bottom: 20px;
            position: relative;
        }
        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--surface2);
            box-shadow: 0 0 40px rgba(88, 166, 255, 0.08);
        }
        .upload-zone .upload-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .upload-zone h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: var(--text);
        }
        .upload-zone p {
            font-size: 0.85rem;
            color: var(--text3);
        }
        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }
        .btn:hover {
            background: var(--surface2);
            border-color: var(--accent);
        }
        .btn.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 600;
        }
        .btn.accent:hover {
            background: #79b8ff;
        }
        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn.danger:hover {
            background: rgba(248, 81, 73, 0.12);
        }
        .btn.small {
            padding: 6px 12px;
            font-size: 0.78rem;
            border-radius: 7px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            border: 1px solid transparent;
        }
        .stat-chip .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .stat-chip .count {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .chip-sec {
            background: rgba(240, 136, 62, 0.12);
            border-color: rgba(240, 136, 62, 0.35);
            color: var(--sec-color);
        }
        .chip-pei {
            background: rgba(88, 166, 255, 0.12);
            border-color: rgba(88, 166, 255, 0.35);
            color: var(--pei-color);
        }
        .chip-dxe {
            background: rgba(63, 185, 80, 0.12);
            border-color: rgba(63, 185, 80, 0.35);
            color: var(--dxe-color);
        }
        .chip-bds {
            background: rgba(188, 140, 255, 0.12);
            border-color: rgba(188, 140, 255, 0.35);
            color: var(--bds-color);
        }
        .chip-tsl {
            background: rgba(247, 120, 186, 0.12);
            border-color: rgba(247, 120, 186, 0.35);
            color: var(--tsl-color);
        }
        .chip-rt {
            background: rgba(255, 123, 114, 0.12);
            border-color: rgba(255, 123, 114, 0.35);
            color: var(--rt-color);
        }
        .chip-al {
            background: rgba(139, 148, 158, 0.12);
            border-color: rgba(139, 148, 158, 0.35);
            color: var(--al-color);
        }
        .chip-total {
            background: rgba(230, 237, 63, 0.1);
            border-color: rgba(230, 237, 63, 0.3);
            color: var(--pow-color);
        }
        .chip .dot.sec {
            background: var(--sec-color);
        }
        .chip .dot.pei {
            background: var(--pei-color);
        }
        .chip .dot.dxe {
            background: var(--dxe-color);
        }
        .chip .dot.bds {
            background: var(--bds-color);
        }
        .chip .dot.tsl {
            background: var(--tsl-color);
        }
        .chip .dot.rt {
            background: var(--rt-color);
        }
        .chip .dot.al {
            background: var(--al-color);
        }

        /* Search */
        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
        }
        .search-wrap input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .search-wrap .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            pointer-events: none;
        }

        /* Accordion */
        .accordion {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 14px;
        }
        .accordion-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
            background: var(--surface);
        }
        .accordion-header:hover {
            background: var(--surface2);
        }
        .accordion-header .phase-badge {
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .badge-sec {
            background: rgba(240, 136, 62, 0.2);
            color: var(--sec-color);
        }
        .badge-pei {
            background: rgba(88, 166, 255, 0.2);
            color: var(--pei-color);
        }
        .badge-dxe {
            background: rgba(63, 185, 80, 0.2);
            color: var(--dxe-color);
        }
        .badge-bds {
            background: rgba(188, 140, 255, 0.2);
            color: var(--bds-color);
        }
        .badge-tsl {
            background: rgba(247, 120, 186, 0.2);
            color: var(--tsl-color);
        }
        .badge-rt {
            background: rgba(255, 123, 114, 0.2);
            color: var(--rt-color);
        }
        .badge-al {
            background: rgba(139, 148, 158, 0.2);
            color: var(--al-color);
        }
        .accordion-header .line-count {
            font-size: 0.78rem;
            color: var(--text3);
            margin-left: auto;
        }
        .accordion-header .arrow {
            transition: transform 0.3s;
            font-size: 0.7rem;
            color: var(--text3);
        }
        .accordion.open .accordion-header .arrow {
            transform: rotate(90deg);
        }
        .accordion-body {
            display: none;
            max-height: 60vh;
            overflow-y: auto;
            background: var(--bg);
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            line-height: 1.55;
        }
        .accordion.open .accordion-body {
            display: block;
        }
        .log-line {
            padding: 2px 16px;
            white-space: pre-wrap;
            word-break: break-all;
            border-bottom: 1px solid rgba(48, 54, 61, 0.35);
            transition: background 0.12s;
        }
        .log-line:hover {
            background: rgba(255, 255, 255, 0.015);
        }
        .log-line.highlight {
            background: rgba(255, 210, 50, 0.08);
        }
        .log-line .line-num {
            color: var(--text3);
            margin-right: 10px;
            user-select: none;
            font-size: 0.7rem;
            min-width: 50px;
            display: inline-block;
            text-align: right;
        }
        .log-line.key-line {
            border-left: 3px solid var(--accent2);
            background: rgba(63, 185, 80, 0.04);
        }
        .log-line.warn-line {
            border-left: 3px solid var(--warn);
            background: rgba(210, 153, 34, 0.04);
            color: #e3b341;
        }
        .log-line.err-line {
            border-left: 3px solid var(--danger);
            background: rgba(248, 81, 73, 0.04);
            color: #f8716d;
        }

        /* Progress indicator */
        .progress-bar-wrap {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .fill-sec {
            background: var(--sec-color);
        }
        .fill-pei {
            background: var(--pei-color);
        }
        .fill-dxe {
            background: var(--dxe-color);
        }
        .fill-bds {
            background: var(--bds-color);
        }
        .fill-tsl {
            background: var(--tsl-color);
        }
        .fill-rt {
            background: var(--rt-color);
        }
        .fill-al {
            background: var(--al-color);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            z-index: 200;
            animation: slideIn 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .toolbar {
                flex-direction: column;
            }
            .stats-bar {
                gap: 6px;
            }
            .stat-chip {
                font-size: 0.7rem;
                padding: 5px 10px;
            }
            .accordion-header {
                font-size: 0.82rem;
                padding: 10px 12px;
            }
            .log-line {
                font-size: 0.7rem;
                padding: 2px 8px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1><span class="icon">📋</span> UEFI BIOS 啟動日誌分析器</h1>
        <p class="subtitle">上傳 TeraTerm BMC 日誌，自動按啟動階段分類顯示 · Power On → SEC → PEI → DXE → BDS → TSL → RT → AL</p>
    </header>

    <div class="container">
        <!-- Upload Zone -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <h3>拖放文件至此處 或 點擊上傳</h3>
            <p>支援 .log / .txt 格式 · 最大 100MB</p>
            <input type="file" id="fileInput" accept=".log,.txt,.text" />
        </div>

        <!-- Toolbar -->
        <div class="toolbar" id="toolbar" style="display:none;">
            <button class="btn accent" id="btnExpandAll">📖 展開全部</button>
            <button class="btn" id="btnCollapseAll">📕 折疊全部</button>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜尋日誌內容 (支援正則表達式)..." />
            </div>
            <button class="btn" id="btnDownloadRaw">⬇ 下載原始日誌</button>
            <button class="btn" id="btnDownloadParsed">⬇ 下載分類日誌</button>
            <button class="btn danger small" id="btnClear">✕ 清除</button>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar" style="display:none;"></div>

        <!-- Progress Bar -->
        <div class="progress-bar-wrap" id="progressWrap" style="display:none;">
            <div style="display:flex;height:100%;">
                <div class="progress-bar-fill fill-sec" id="pbSec" style="width:0;"></div>
                <div class="progress-bar-fill fill-pei" id="pbPei" style="width:0;"></div>
                <div class="progress-bar-fill fill-dxe" id="pbDxe" style="width:0;"></div>
                <div class="progress-bar-fill fill-bds" id="pbBds" style="width:0;"></div>
                <div class="progress-bar-fill fill-tsl" id="pbTsl" style="width:0;"></div>
                <div class="progress-bar-fill fill-rt" id="pbRt" style="width:0;"></div>
                <div class="progress-bar-fill fill-al" id="pbAl" style="width:0;"></div>
            </div>
        </div>

        <!-- Accordion Container -->
        <div id="accordionContainer"></div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // DOM Elements
            // ──────────────────────────────────────
            const uploadZone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');
            const toolbar = document.getElementById('toolbar');
            const statsBar = document.getElementById('statsBar');
            const progressWrap = document.getElementById('progressWrap');
            const accordionContainer = document.getElementById('accordionContainer');
            const searchInput = document.getElementById('searchInput');
            const btnExpandAll = document.getElementById('btnExpandAll');
            const btnCollapseAll = document.getElementById('btnCollapseAll');
            const btnDownloadRaw = document.getElementById('btnDownloadRaw');
            const btnDownloadParsed = document.getElementById('btnDownloadParsed');
            const btnClear = document.getElementById('btnClear');

            let originalLogContent = '';
            let parsedSections = {}; // { phaseKey: { label, badgeClass, lines: [{num, text}] } }
            let totalLines = 0;
            let phaseOrder = ['power_on', 'sec', 'pei', 'dxe', 'bds', 'tsl', 'rt', 'al'];

            // ──────────────────────────────────────
            // Phase Definitions
            // ──────────────────────────────────────
            const phaseDefs = [
                { key: 'power_on', label: 'Power On / Reset', badgeClass: 'badge-al', dotClass: 'al',
                    colorHex: '#e6ed3f', icon: '⚡',
                    desc: '系統上電復位，微碼載入，早期硬體初始化' },
                { key: 'sec', label: 'SEC (Security Phase)', badgeClass: 'badge-sec', dotClass: 'sec',
                    colorHex: '#f0883e', icon: '🔒',
                    desc: '安全驗證階段，CAR (Cache-As-RAM) 設定，PEI Core 入口前' },
                { key: 'pei', label: 'PEI (Pre-EFI Initialization)', badgeClass: 'badge-pei', dotClass: 'pei',
                    colorHex: '#58a6ff', icon: '🧱',
                    desc: 'Pre-EFI 初始化，記憶體初始化 (MRC)，平台早期初始化' },
                { key: 'dxe', label: 'DXE (Driver Execution Environment)', badgeClass: 'badge-dxe', dotClass: 'dxe',
                    colorHex: '#3fb950', icon: '⚙️',
                    desc: '驅動程式執行環境，Protocol 安裝，驅動載入，SMM 初始化' },
                { key: 'bds', label: 'BDS (Boot Device Selection)', badgeClass: 'badge-bds', dotClass: 'bds',
                    colorHex: '#bc8cff', icon: '💾',
                    desc: '啟動裝置選擇，PCI 匯流排列舉，Option ROM，Console 初始化' },
                { key: 'tsl', label: 'TSL (Transient System Load)', badgeClass: 'badge-tsl', dotClass: 'tsl',
                    colorHex: '#f778ba', icon: '🚀',
                    desc: '作業系統載入階段 (Boot Loader)' },
                { key: 'rt', label: 'RT (Runtime)', badgeClass: 'badge-rt', dotClass: 'rt', colorHex: '#ff7b72',
                    icon: '⏱️',
                    desc: 'UEFI Runtime Services，SetVirtualAddressMap，ExitBootServices' },
                { key: 'al', label: 'AL (Afterlife / Shutdown)', badgeClass: 'badge-al', dotClass: 'al',
                    colorHex: '#8b949e', icon: '🛑',
                    desc: '系統關機或重啟階段' },
            ];

            // ──────────────────────────────────────
            // Phase Detection Patterns
            // ──────────────────────────────────────
            // We scan for boundary markers in order.
            // Each boundary is defined as: the phase starts at the line matching 'startPattern'
            const phaseBoundaries = [
                { phase: 'power_on', startPattern: null,
                    desc: '檔案開始' }, // always from line 0
                { phase: 'sec', startPattern: /SecStartup\(\)|SecPlatformMain|PrintPeiCoreEntryPointParam/i,
                    desc: 'SEC 階段開始' },
                { phase: 'pei', startPattern: /PeiCore\.Entry|PeiCore\.Entry\(/i, desc: 'PEI Core 入口' },
                { phase: 'dxe', startPattern: /DXE-Core\.Entry|DXE Core Started|DXE-Core\.Entry\(/i,
                    desc: 'DXE Core 入口' },
                { phase: 'bds', startPattern: /BDS Started|BDS Started\./i, desc: 'BDS 階段開始' },
                { phase: 'tsl', startPattern: /SetVirtualAddressMap|VirtualAddressChange|ExitBootServices|EFI_OS_LOAD/i,
                    desc: 'TSL/OS Load 階段' },
                { phase: 'rt', startPattern: /Runtime.*Services|SetVirtualAddressMap|RT.*phase/i,
                    desc: 'Runtime 階段' },
                { phase: 'al', startPattern: /shutdown|Shutdown|reset system|ACPI.*S5|Power.*Off/i,
                    desc: '關機/Afterlife' },
            ];

            // ──────────────────────────────────────
            // File Handling
            // ──────────────────────────────────────
            uploadZone.addEventListener('click', (e) => {
                if (e.target !== fileInput) fileInput.click();
            });
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('drag-over');
            });
            uploadZone.addEventListener('dragleave', () => {
                uploadZone.classList.remove('drag-over');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (file) processFile(file);
            });
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) processFile(file);
            });

            function processFile(file) {
                if (file.size > 100 * 1024 * 1024) {
                    showToast('⚠️ 檔案過大，請上傳小於 100MB 的檔案');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    originalLogContent = ev.target.result;
                    parseAndDisplay(originalLogContent);
                    showToast(`✅ 已載入：${file.name} (${(file.size / 1024).toFixed(1)} KB)`);
                };
                reader.onerror = function() {
                    showToast('❌ 讀取檔案失敗');
                };
                reader.readAsText(file);
            }

            // ──────────────────────────────────────
            // Parse Logic
            // ──────────────────────────────────────
            function parseAndDisplay(content) {
                const allLines = content.split(/\r?\n/);
                totalLines = allLines.length;

                // Find boundary line indices
                let boundaries = [];
                for (let i = 0; i < phaseBoundaries.length; i++) {
                    const pb = phaseBoundaries[i];
                    if (pb.startPattern === null) {
                        boundaries.push({ phase: pb.phase, lineIdx: 0, desc: pb.desc });
                    } else {
                        let found = false;
                        for (let j = (boundaries.length > 0 ? boundaries[boundaries.length - 1].lineIdx : 0); j <
                            allLines.length; j++) {
                            if (pb.startPattern.test(allLines[j])) {
                                boundaries.push({ phase: pb.phase, lineIdx: j, desc: pb.desc });
                                found = true;
                                break;
                            }
                        }
                        if (!found) {
                            // No boundary found for this phase; it will be empty
                            boundaries.push({ phase: pb.phase, lineIdx: -1, desc: pb.desc + ' (未檢測到)' });
                        }
                    }
                }

                // Build sections
                parsedSections = {};
                for (const pd of phaseDefs) {
                    parsedSections[pd.key] = {
                        label: pd.label,
                        badgeClass: pd.badgeClass,
                        dotClass: pd.dotClass,
                        colorHex: pd.colorHex,
                        icon: pd.icon,
                        desc: pd.desc,
                        lines: [],
                        lineCount: 0,
                    };
                }

                // Assign lines to phases
                for (let i = 0; i < boundaries.length; i++) {
                    const b = boundaries[i];
                    if (b.lineIdx < 0) continue;
                    const startIdx = b.lineIdx;
                    const endIdx = (i + 1 < boundaries.length && boundaries[i + 1].lineIdx >= 0) ?
                        boundaries[i + 1].lineIdx - 1 :
                        allLines.length - 1;

                    for (let j = startIdx; j <= endIdx && j < allLines.length; j++) {
                        const lineObj = {
                            num: j + 1,
                            text: allLines[j],
                            isKey: false,
                            isWarn: false,
                            isErr: false,
                        };
                        // Highlight key lines
                        if (/PROGRESS CODE|ERROR:|Warning|FAIL|Halt|assert/i.test(lineObj.text)) {
                            if (/ERROR:|FAIL|Halt/i.test(lineObj.text)) lineObj.isErr = true;
                            else if (/Warning|WARN/i.test(lineObj.text)) lineObj.isWarn = true;
                            else lineObj.isKey = true;
                        }
                        parsedSections[b.phase].lines.push(lineObj);
                    }
                }

                // Update counts
                for (const pd of phaseDefs) {
                    parsedSections[pd.key].lineCount = parsedSections[pd.key].lines.length;
                }

                // Render
                renderAll();
                toolbar.style.display = 'flex';
                statsBar.style.display = 'flex';
                progressWrap.style.display = 'block';
                uploadZone.style.display = 'none';
            }

            // ──────────────────────────────────────
            // Render
            // ──────────────────────────────────────
            function renderAll() {
                renderStats();
                renderProgress();
                renderAccordions();
            }

            function renderStats() {
                let html = '';
                for (const pd of phaseDefs) {
                    const s = parsedSections[pd.key];
                    html +=
                        `<span class="stat-chip chip-${pd.key === 'power_on' ? 'al' : pd.key}" title="${pd.desc}">
                    <span class="dot ${pd.dotClass}"></span> ${pd.icon} ${pd.label}
                    <span class="count">${s.lineCount.toLocaleString()}</span> 行
                </span>`;
                }
                html +=
                    `<span class="stat-chip chip-total"><span class="dot" style="background:var(--pow-color);"></span> 📊 總計 <span class="count">${totalLines.toLocaleString()}</span> 行</span>`;
                statsBar.innerHTML = html;
            }

            function renderProgress() {
                if (totalLines === 0) return;
                const pbSec = document.getElementById('pbSec');
                const pbPei = document.getElementById('pbPei');
                const pbDxe = document.getElementById('pbDxe');
                const pbBds = document.getElementById('pbBds');
                const pbTsl = document.getElementById('pbTsl');
                const pbRt = document.getElementById('pbRt');
                const pbAl = document.getElementById('pbAl');
                const mapping = { 'power_on': pbAl, 'sec': pbSec, 'pei': pbPei, 'dxe': pbDxe, 'bds': pbBds, 'tsl': pbTsl,
                    'rt': pbRt, 'al': pbAl };
                for (const pd of phaseDefs) {
                    const el = mapping[pd.key];
                    if (el) {
                        el.style.width = ((parsedSections[pd.key].lineCount / totalLines) * 100).toFixed(2) + '%';
                    }
                }
            }

            function renderAccordions() {
                let html = '';
                const searchTerm = searchInput.value.trim().toLowerCase();
                let searchRegex = null;
                if (searchTerm) {
                    try { searchRegex = new RegExp(searchTerm, 'i'); } catch (e) { searchRegex = null; }
                }

                for (const pd of phaseDefs) {
                    const s = parsedSections[pd.key];
                    const phaseKey = pd.key;
                    html += `
                <div class="accordion ${s.lineCount > 0 ? 'open' : ''}" data-phase="${phaseKey}">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <span class="arrow">▶</span>
                        <span class="phase-badge ${pd.badgeClass}">${pd.icon} ${pd.key.toUpperCase()}</span>
                        <span>${pd.label}</span>
                        <span class="line-count">${s.lineCount.toLocaleString()} 行</span>
                    </div>
                    <div class="accordion-body" id="body-${phaseKey}">
                        ${renderLines(s, searchRegex)}
                    </div>
                </div>`;
                }
                accordionContainer.innerHTML = html;
            }

            function renderLines(section, searchRegex) {
                if (section.lines.length === 0) {
                    return '<div class="log-line" style="color:var(--text3);font-style:italic;text-align:center;padding:20px;">（此階段無日誌內容）</div>';
                }
                let html = '';
                for (const l of section.lines) {
                    let cssClass = 'log-line';
                    if (l.isErr) cssClass += ' err-line';
                    else if (l.isWarn) cssClass += ' warn-line';
                    else if (l.isKey) cssClass += ' key-line';

                    let displayText = escapeHtml(l.text);
                    // Highlight search matches
                    if (searchRegex) {
                        displayText = displayText.replace(searchRegex, (match) => `<mark style="background:#d29922;color:#000;padding:0 2px;border-radius:2px;">${match}</mark>`);
                    }
                    // Truncate very long lines for display
                    if (displayText.length > 2000) {
                        displayText = displayText.substring(0, 2000) +
                            `... <span style="color:var(--text3);">[行長度 ${l.text.length} 字元，已截斷顯示]</span>`;
                    }
                    html +=
                        `<div class="${cssClass}"><span class="line-num">${l.num}</span>${displayText}</div>`;
                }
                return html;
            }

            function escapeHtml(str) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return str.replace(/[&<>"']/g, (c) => map[c]);
            }

            // ──────────────────────────────────────
            // Accordion Toggle
            // ──────────────────────────────────────
            window.toggleAccordion = function(headerEl) {
                const acc = headerEl.parentElement;
                acc.classList.toggle('open');
            };

            btnExpandAll.addEventListener('click', () => {
                document.querySelectorAll('.accordion').forEach(a => a.classList.add('open'));
            });
            btnCollapseAll.addEventListener('click', () => {
                document.querySelectorAll('.accordion').forEach(a => a.classList.remove('open'));
            });

            // ──────────────────────────────────────
            // Search
            // ──────────────────────────────────────
            searchInput.addEventListener('input', () => {
                if (Object.keys(parsedSections).length > 0) {
                    renderAccordions();
                    // Expand all when searching
                    if (searchInput.value.trim()) {
                        document.querySelectorAll('.accordion').forEach(a => a.classList.add('open'));
                    }
                }
            });

            // ──────────────────────────────────────
            // Download
            // ──────────────────────────────────────
            btnDownloadRaw.addEventListener('click', () => {
                if (!originalLogContent) { showToast('⚠️ 請先上傳日誌檔案'); return; }
                downloadFile('bios_log_raw.log', originalLogContent);
            });
            btnDownloadParsed.addEventListener('click', () => {
                if (!originalLogContent || Object.keys(parsedSections).length === 0) {
                    showToast('⚠️ 請先上傳日誌檔案');
                    return;
                }
                let out = '';
                for (const pd of phaseDefs) {
                    const s = parsedSections[pd.key];
                    out += `\n${'='.repeat(80)}\n`;
                    out += `  ${pd.icon}  ${pd.label}  -  ${s.lineCount} 行\n`;
                    out += `${'='.repeat(80)}\n\n`;
                    for (const l of s.lines) {
                        out += `[${l.num}] ${l.text}\n`;
                    }
                }
                downloadFile('bios_log_parsed.log', out);
            });

            function downloadFile(filename, content) {
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast(`⬇ 已下載：${filename}`);
            }

            // ──────────────────────────────────────
            // Clear
            // ──────────────────────────────────────
            btnClear.addEventListener('click', () => {
                originalLogContent = '';
                parsedSections = {};
                totalLines = 0;
                accordionContainer.innerHTML = '';
                statsBar.style.display = 'none';
                progressWrap.style.display = 'none';
                toolbar.style.display = 'none';
                uploadZone.style.display = '';
                searchInput.value = '';
                fileInput.value = '';
                showToast('🗑️ 已清除所有資料');
            });

            // ──────────────────────────────────────
            // Toast
            // ──────────────────────────────────────
            function showToast(msg) {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
            }

            // ──────────────────────────────────────
            // Demo: Load embedded sample if URL has ?demo
            // ──────────────────────────────────────
            if (window.location.search.includes('demo')) {
                // Provide a tiny sample for quick testing
                const sample = `PrintPeiCoreEntryPointParam in PlatformInit
        SecStartup() TempRAM Base: 0xFE800000
        PeiCore.Entry(FFF3D9A8)
        Loading PEIM 9B3ADA4F-AE56-4C24-8DEA-F03B7558AE50
        Install PPI: Pcd
        DXE-Core.Entry(6FA1F9A4)
        DXE Core Started
        InstallProtocolInterface: EfiLoadedImage
        BDS Started
        PCI Bus Initialization
        PciBus: Probing PCI Device @ [S0][B0|D0|F0]......Success`;
                originalLogContent = sample;
                parseAndDisplay(sample);
                toolbar.style.display = 'flex';
                statsBar.style.display = 'flex';
                progressWrap.style.display = 'block';
                uploadZone.style.display = 'none';
            }
        })();
    </script>
</body>
</html>
